name: build-windows

on:
  push:
    tags:
      - 'v*-vulcan.*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Draft-release tag (leave empty to only build artifacts)'
        required: false
        default: ''

# ------------------------------------------------------------------------------
# Vulcan Office desktop v1 - Windows x64 build (unsigned)
#
# Pipeline:
#   1. Checkout this repo + clone Euro-Office/desktop-apps at the pinned SHA.
#   2. Apply the branding overlay via desktop/build/apply-branding.sh.
#   3. Prepare the toolchain (Qt, MSBuild, Inno Setup) via preinstalled runner
#      software or vcpkg-installed dependencies.
#   4. Invoke package/make.ps1 with -Branding vulcanoffice to produce the
#      Inno Setup installer.
#   5. Compute sha256, GPG-sign sha256sums.txt with the release key, upload as
#      release assets.
# ------------------------------------------------------------------------------

permissions:
  contents: write   # required to create Releases

env:
  UPSTREAM_REPO: Euro-Office/desktop-apps
  UPSTREAM_SHA: e5f89e272861
  ENGINE_REPO: Euro-Office/DesktopEditors
  ENGINE_TAG: v9.3.1
  RELEASE_KEY_ID: releases@vulcanoffice.com

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      # -----------------------------------------------------------------
      - name: Checkout vulcan-office-stack
        uses: actions/checkout@v4
        with:
          path: stack

      - name: Sanity check upstream pin matches UPSTREAM.md
        shell: pwsh
        run: |
          $u = Get-Content stack/desktop/UPSTREAM.md -Raw
          if (-not ($u -match "$env:UPSTREAM_SHA")) {
            throw "UPSTREAM.md does not reference expected shell SHA $env:UPSTREAM_SHA"
          }
          if (-not ($u -match "$env:ENGINE_TAG")) {
            throw "UPSTREAM.md does not reference expected engine tag $env:ENGINE_TAG"
          }

      # -----------------------------------------------------------------
      - name: Clone upstream desktop-apps at pinned SHA
        shell: bash
        run: |
          git clone --no-checkout https://github.com/$UPSTREAM_REPO.git upstream-shell
          git -C upstream-shell fetch --depth 1 origin $UPSTREAM_SHA
          git -C upstream-shell checkout $UPSTREAM_SHA

      - name: Apply Vulcan branding overlay
        shell: bash
        env:
          BUILD_SHA: ${{ github.sha }}
          BUILD_DATE: ${{ github.event.repository.updated_at }}
        run: bash stack/desktop/build/apply-branding.sh upstream-shell

      # -----------------------------------------------------------------
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.2'
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          modules: 'qtwebengine qtpositioning qtwebchannel'

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --version=6.3.3 --no-progress -y

      # -----------------------------------------------------------------
      - name: Build installer via upstream make.ps1
        shell: pwsh
        working-directory: upstream-shell/package
        run: |
          . ./branding.vulcanoffice.ps1
          # Upstream make.ps1 dispatches to make_inno.ps1 based on -Format.
          ./make.ps1 -Branding vulcanoffice -Format inno -Arch x64
        continue-on-error: false

      - name: Locate produced installer
        id: locate
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Recurse -Path upstream-shell/package/build -Filter "VulcanOffice-Setup-x64*.exe" |
            Select-Object -First 1
          if (-not $exe) { throw "installer not produced" }
          "installer=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Copy-Item $exe.FullName "VulcanOffice-Setup-x64.exe"

      # -----------------------------------------------------------------
      - name: Compute sha256sums.txt
        shell: pwsh
        run: |
          $hash = (Get-FileHash VulcanOffice-Setup-x64.exe -Algorithm SHA256).Hash.ToLower()
          "$hash  VulcanOffice-Setup-x64.exe" | Out-File -FilePath sha256sums.txt -Encoding ASCII

      - name: Import GPG release key
        if: env.RELEASE_KEY_AVAILABLE == 'true'
        shell: bash
        env:
          RELEASE_KEY_AVAILABLE: ${{ secrets.GPG_RELEASE_PRIVATE_KEY != '' }}
          GPG_RELEASE_PRIVATE_KEY: ${{ secrets.GPG_RELEASE_PRIVATE_KEY }}
        run: |
          echo "$GPG_RELEASE_PRIVATE_KEY" | gpg --batch --import
          gpg --list-secret-keys "$RELEASE_KEY_ID"

      - name: Sign sha256sums.txt
        if: env.RELEASE_KEY_AVAILABLE == 'true'
        shell: bash
        env:
          RELEASE_KEY_AVAILABLE: ${{ secrets.GPG_RELEASE_PRIVATE_KEY != '' }}
        run: |
          gpg --batch --yes \
              --local-user "$RELEASE_KEY_ID" \
              --detach-sign --armor \
              --output sha256sums.txt.asc \
              sha256sums.txt
          gpg --verify sha256sums.txt.asc sha256sums.txt

      # -----------------------------------------------------------------
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vulcanoffice-windows-x64
          path: |
            VulcanOffice-Setup-x64.exe
            sha256sums.txt
            sha256sums.txt.asc
          if-no-files-found: warn
          retention-days: 30

      # -----------------------------------------------------------------
      - name: Publish GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            VulcanOffice-Setup-x64.exe
            sha256sums.txt
            sha256sums.txt.asc
            stack/desktop/keys/releases-pubkey.asc
          fail_on_unmatched_files: false
          generate_release_notes: true
          body: |
            ## Vulcan Office ${{ github.ref_name }} (Windows x64, unsigned)

            **Windows SmartScreen** will show "Windows protected your PC" on
            first execution. Click *More info* -> *Run anyway* to proceed.

            **Verify the download** (optional, but recommended):
            ```powershell
            Get-FileHash VulcanOffice-Setup-x64.exe -Algorithm SHA256
            # Compare against sha256sums.txt
            ```
            If you have the Vulcan Office release GPG key imported:
            ```bash
            gpg --verify sha256sums.txt.asc sha256sums.txt
            ```

            Corresponding source (AGPL-3.0 sec. 6(d)):
            https://github.com/freddominugez/vulcan-office-stack/tree/${{ github.ref_name }}
