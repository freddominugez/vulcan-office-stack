# Vulcan Office - production stack.
#
# Replaces the previous Nextcloud-based stack. The DMS is now our own app
# (`vulcan-drive`), files live in Backblaze B2, and the editor is our own AGPL
# build of the Document Server instead of the upstream Euro-Office image.
#
# THE AGPL BOUNDARY (invariant #1 -- do not break this)
#   `app` is PROPRIETARY. It talks to `documentserver` ONLY over HTTP/JSON and by
#   loading <script src=".../web-apps/apps/api/documents/api.js">. It must never
#   import, vendor or bundle anything from sdkjs / web-apps / core, and must never
#   copy code out of document-server-integration (which is AGPL too -- read it as
#   protocol documentation, never as a source to paste from).
#
# EXPOSURE
#   Only `caddy` binds host ports. The Document Server is NOT published: it is
#   reachable solely inside `frontnet`, and from the internet only through
#   office.vulcanoffice.com, which proxies api.js, the editor assets and the
#   WebSocket. Postgres and Redis sit on `backnet`, which is `internal: true` and
#   therefore has no route off the host at all.
#
# SECRETS
#   Every secret comes from the environment (see .env.example). Nothing is baked in.
#   `docker compose config` will fail loudly on any missing required value.

services:
  caddy:
    image: caddy-cf:2          # custom build: Caddy + Cloudflare DNS plugin (DNS-01)
    container_name: vo-caddy
    pull_policy: never
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      CF_API_TOKEN: "${CF_API_TOKEN:?CF_API_TOKEN is required}"
    networks: [frontnet]
    mem_limit: 256m

  documentserver:
    # Our AGPL fork, built from source by .github/workflows/build-documentserver.yml
    # (or locally by scripts/rebrand.sh + docker buildx bake). Corresponding source:
    # https://github.com/freddominugez/vulcan-office-stack
    image: "${VO_DS_IMAGE:?VO_DS_IMAGE is required}"
    container_name: vo-ds
    restart: unless-stopped
    stop_grace_period: 60s
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: "${VO_JWT_SECRET:?VO_JWT_SECRET is required}"
      JWT_HEADER: Authorization
      JWT_IN_BODY: "true"
      USE_UNAUTHORIZED_STORAGE: "false"
    volumes:
      # The brand is compiled INTO this image, so unlike the old deployment there are
      # no logo bind-mounts here. That is the whole point of building from source:
      # nothing to re-diff and silently break every time the upstream image bumps.
      - ds_data:/var/www/vulcan-office/Data
      - ds_log:/var/log/vulcan-office
      - ds_lib:/var/lib/vulcan-office
      - ds_pg:/var/lib/postgresql
    networks: [frontnet]
    mem_limit: 8g
    memswap_limit: 8g
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:80/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 180s

  app:
    # vulcan-drive: the Nextcloud replacement. PROPRIETARY -- see the AGPL boundary note.
    image: "${VO_APP_IMAGE:-ghcr.io/freddominugez/vulcan-drive:latest}"
    container_name: vo-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: "postgres://vulcan:${DB_PWD:?DB_PWD is required}@db:5432/vulcan"
      REDIS_URL: "redis://:${REDIS_PWD:?REDIS_PWD is required}@redis:6379"
      # Backblaze B2, S3-compatible. Already the store of record for user files.
      B2_ENDPOINT: "${B2_ENDPOINT:?B2_ENDPOINT is required}"
      B2_REGION: "${B2_REGION:?B2_REGION is required}"
      B2_BUCKET: "${B2_BUCKET:?B2_BUCKET is required}"
      B2_KEY_ID: "${B2_KEY_ID:?B2_KEY_ID is required}"
      B2_APP_KEY: "${B2_APP_KEY:?B2_APP_KEY is required}"
      # Same secret the Document Server verifies with; both directions are signed.
      VO_JWT_SECRET: "${VO_JWT_SECRET:?VO_JWT_SECRET is required}"
      # Browser-facing origin of the editor (api.js is loaded from here).
      NEXT_PUBLIC_DS_URL: "https://office.vulcanoffice.com"
      # Origin the Document Server calls back on, from inside frontnet.
      APP_INTERNAL_URL: "http://app:3000"
      AI_GATEWAY_URL: "http://aiproxy:8800"
    networks: [frontnet, backnet]
    mem_limit: 1g

  aiproxy:
    # OpenAI-compatible shim in front of the Vulcan AI gateway; the editor's AI plugin
    # points at it. It was running on the host but was NOT in this file -- undocumented
    # drift found on 2026-07-12. Declared here so it stops being invisible.
    image: python:3-alpine
    container_name: vo-aiproxy
    restart: unless-stopped
    command: ["python", "/app/proxy.py"]
    volumes:
      - ./aiproxy:/app:ro
    environment:
      VULCAN_PLATFORM_SECRET: "${VULCAN_PLATFORM_SECRET:?VULCAN_PLATFORM_SECRET is required}"
      PRODUCT: vulcan-office
      GATEWAY_URL: "${AI_GATEWAY_URL:-https://admin.byvulcan.com/api/ai-gateway}"
    networks: [frontnet]
    mem_limit: 128m

  db:
    image: postgres:16-alpine
    container_name: vo-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: vulcan
      POSTGRES_USER: vulcan
      POSTGRES_PASSWORD: "${DB_PWD:?DB_PWD is required}"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks: [backnet]
    mem_limit: 1g
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vulcan -d vulcan"]
      interval: 15s
      timeout: 5s
      retries: 6

  redis:
    image: redis:7-alpine
    container_name: vo-redis
    restart: unless-stopped
    command: redis-server --requirepass "${REDIS_PWD:?REDIS_PWD is required}" --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks: [backnet]
    mem_limit: 300m

volumes:
  caddy_data: {}
  caddy_config: {}
  ds_data: {}
  ds_log: {}
  ds_lib: {}
  ds_pg: {}
  pg_data: {}

networks:
  frontnet:
    driver: bridge
    name: vo-frontnet
  backnet:
    driver: bridge
    name: vo-backnet
    internal: true          # no route off the host: Postgres/Redis are unreachable externally
